# =============================================================================
# movie-finder-rag — Git pre-commit hooks configuration
#
# These hooks are mirrored in the Docker development container via the Makefile.
# =============================================================================

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-ast
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-merge-conflict
      - id: detect-private-key
      - id: debug-statements

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: .env.example

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - pydantic-settings
        args:
          - --check-untyped-defs
          - --disallow-untyped-defs
          - --ignore-missing-imports
          - --warn-return-any
          - --warn-unused-ignores
          - --show-error-codes
        exclude: (^tests/|/tests/)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.13
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
