[project]
name = "rag-ingestion"
version = "0.1.0"
description = "AI/Data ingestion pipeline — embeds Kaggle movie dataset into a Qdrant vector store"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "dotenv>=0.9.9",
    "kagglehub>=1.0.0",
    "openai>=2.29.0",
    "pandas>=3.0.1",
    "pydantic>=2.12.5",
    "qdrant-client>=1.17.1",
]

[dependency-groups]
lint = [
    "ruff>=0.9.0",
    "mypy>=1.15.0",
]
test = [
    "pytest>=8.3.0",
    "pytest-cov>=6.0.0",
]
dev = [
    { include-group = "lint" },
    { include-group = "test" },
]

[tool.uv]
default-groups = []

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = ["E501", "B008"] # Ignore line length and function calls in defaults (FastAPI)

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
files = ["src"]
python_version = "3.13"
check_untyped_defs = true
disallow_untyped_defs = true
ignore_missing_imports = true
warn_return_any = true
warn_unused_ignores = true
show_error_codes = true
plugins = ["pydantic.mypy"]
