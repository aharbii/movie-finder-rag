# =============================================================================
# rag_ingestion — docker-compose for local development and CI
#
# Services:
#   qdrant     — local Qdrant instance (always started)
#   ingestion  — batch ingestion job (profile "run" — manual trigger only)
#
# Usage:
#   # Start Qdrant for local exploration / testing:
#   docker compose up qdrant
#
#   # Run the full ingestion pipeline against local Qdrant:
#   docker compose --profile run up --build ingestion
#
#   # Run against Qdrant Cloud (set QDRANT_ENDPOINT in .env):
#   docker compose run ingestion
#
# Environment:
#   Copy .env.example → .env and fill in values before running.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Qdrant — local vector store for development / integration tests
  # Production uses Qdrant Cloud; configure via QDRANT_ENDPOINT in .env.
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: rag-qdrant-dev
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Ingestion — one-shot batch job, manual trigger only (profile: run)
  # Not started by default; requires --profile run flag.
  # ---------------------------------------------------------------------------
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-ingestion-job
    env_file:
      - .env
    environment:
      # Override Qdrant endpoint to use the local container when developing
      # Remove this override to use QDRANT_ENDPOINT from .env (Qdrant Cloud)
      QDRANT_ENDPOINT: "http://qdrant:6333"
      QDRANT_API_KEY: ""
    depends_on:
      qdrant:
        condition: service_healthy
    profiles:
      - run
    restart: "no"

volumes:
  qdrant_data:
    name: rag-ingestion-qdrant-data
